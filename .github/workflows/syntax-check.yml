name: Syntax-Check

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: node -c fuxtools.user.js
